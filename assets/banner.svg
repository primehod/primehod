<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="limeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1500" height="500" fill="#F4F7EC"/>

  <!-- left: wordmark -->
  <text x="90" y="235" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="900" letter-spacing="2" fill="#050600">PRIMEHOD</text>
  <rect x="94" y="262" width="150" height="10" rx="5" fill="#CEF606"/>
  <text x="90" y="328" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#050600">The token launchpad on
    <tspan fill="#D99E00" filter="url(#goldGlow)" font-weight="800"> Robinhood Chain</tspan>
  </text>
  <text x="90" y="378" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#4b4d44">Fair bonding-curve launches. Fully on-chain, no admin keys.</text>

  <!-- live pill -->
  <rect x="90" y="410" width="248" height="46" rx="23" fill="#050600"/>
  <circle cx="120" cy="433" r="7" fill="#00C805"/>
  <text x="138" y="441" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#F4F7EC">LIVE ON MAINNET</text>

  <!-- right: card with curve -->
  <g>
    <rect x="960" y="70" width="450" height="360" rx="24" fill="#FFFFFF" stroke="#050600" stroke-opacity="0.08" stroke-width="2"/>
    <!-- grid -->
    <line x1="990" y1="160" x2="1380" y2="160" stroke="#050600" stroke-opacity="0.06" stroke-width="1.5"/>
    <line x1="990" y1="240" x2="1380" y2="240" stroke="#050600" stroke-opacity="0.06" stroke-width="1.5"/>
    <line x1="990" y1="320" x2="1380" y2="320" stroke="#050600" stroke-opacity="0.06" stroke-width="1.5"/>
    <!-- candles -->
    <g>
      <line x1="1020" y1="330" x2="1020" y2="382" stroke="#00C805" stroke-width="3"/>
      <rect x="1010" y="338" width="20" height="34" rx="3" fill="#00C805"/>
      <line x1="1065" y1="300" x2="1065" y2="356" stroke="#FF494A" stroke-width="3"/>
      <rect x="1055" y="312" width="20" height="30" rx="3" fill="#FF494A"/>
      <line x1="1110" y1="272" x2="1110" y2="336" stroke="#00C805" stroke-width="3"/>
      <rect x="1100" y="282" width="20" height="42" rx="3" fill="#00C805"/>
      <line x1="1155" y1="236" x2="1155" y2="300" stroke="#00C805" stroke-width="3"/>
      <rect x="1145" y="246" width="20" height="44" rx="3" fill="#00C805"/>
      <line x1="1200" y1="214" x2="1200" y2="268" stroke="#FF494A" stroke-width="3"/>
      <rect x="1190" y="224" width="20" height="28" rx="3" fill="#FF494A"/>
      <line x1="1245" y1="170" x2="1245" y2="240" stroke="#00C805" stroke-width="3"/>
      <rect x="1235" y="182" width="20" height="48" rx="3" fill="#00C805"/>
      <line x1="1290" y1="132" x2="1290" y2="200" stroke="#00C805" stroke-width="3"/>
      <rect x="1280" y="144" width="20" height="46" rx="3" fill="#00C805"/>
    </g>
    <!-- bonding curve -->
    <path d="M 992 392 Q 1180 380 1280 260 T 1382 108" fill="none" stroke="#CEF606" stroke-width="9" stroke-linecap="round" filter="url(#limeGlow)"/>
    <!-- graduation badge -->
    <rect x="1216" y="88" width="166" height="40" rx="20" fill="#050600"/>
    <circle cx="1240" cy="108" r="7" fill="#CEF606"/>
    <text x="1254" y="115" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#F4F7EC">GRADUATED</text>
  </g>
</svg>
