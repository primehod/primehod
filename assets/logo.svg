<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="goldGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#F4F7EC"/>
  <!-- golden rising arc -->
  <path d="M 122 400 Q 260 392 330 300 T 408 138" fill="none" stroke="#D99E00" stroke-width="18" stroke-linecap="round" filter="url(#goldGlow)"/>
  <!-- bold P monogram -->
  <g>
    <path d="M 168 118 L 168 394 L 232 394 L 232 306 L 296 306 C 352 306 392 266 392 212 C 392 158 352 118 296 118 Z M 232 178 L 290 178 C 314 178 328 192 328 212 C 328 232 314 246 290 246 L 232 246 Z" fill="#050600"/>
    <!-- lime counter fill -->
    <path d="M 232 178 L 290 178 C 314 178 328 192 328 212 C 328 232 314 246 290 246 L 232 246 Z" fill="#CEF606"/>
  </g>
</svg>
